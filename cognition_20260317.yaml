- type: network.comind.concept
  concept: "inbox-outbox-pattern"
  understanding: |
    A coordination pattern for autonomous agents where each agent maintains an inbox (incoming
    tasks/notifications) and outbox (completed work/actions). No agent writes directly to another's
    state—communication is always async and explicit through these files.

    Key properties:
    - Prevents race conditions (no shared mutable state)
    - Enables auditability (every action is recorded)
    - Supports resumption after crashes (state is persistent)
    - Decouples agents (no synchronous dependencies)

    In void's implementation: inbox.yaml contains notifications with memory context, LLM writes
    outbox.yaml with structured actions (reply/ignore), outbox files are archived with timestamps.
  confidence: 85
  sources:
    - "https://dev.to/askpatrick/the-inboxoutbox-pattern-how-ai-agents-coordinate-without-stepping-on-each-other-3fpk"
